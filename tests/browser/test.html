<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>RUNNING</title>
<!--
  SFSS in-browser test runner (Phase 0).

  Must be served over HTTP from the app root (module imports + fetch need it), e.g.:
      cd E:\scratch\Sfss\app && python -m http.server 8123
      -> http://localhost:8123/tests/browser/test.html

  Automation contract (for Chrome-DevTools-MCP / headless drivers):
    - window.__results        : [{ name, ok, error }] per test
    - <ul id="results">        : one <li> per test, class "pass" | "fail"
    - <div id="summary">       : "X passed, Y failed"
    - document.body.dataset.done === '1' when the run is complete
    - document.title           : 'PASS' or 'FAIL' when complete

  Adding tests (later phases): append entries to the REGISTRY array below with
  test('name', async () => { ... }). Nothing else needs to change.
-->
<!-- Pagination tests measure real .page geometry: load the same sheets the app
     loads (same cascade order: fonts -> editor -> print). -->
<link rel="stylesheet" href="../../assets/googlefonts.css">
<link rel="stylesheet" href="../../assets/css/editor.css">
<link rel="stylesheet" href="../../assets/css/print.css">
<style>
  body { font-family: monospace; margin: 1.5rem; background: #fff; color: #111; }
  ul#results { list-style: none; padding: 0; }
  ul#results li { padding: 2px 6px; }
  ul#results li.pass { color: #0a6b2d; }
  ul#results li.pass::before { content: "PASS  "; font-weight: bold; }
  ul#results li.fail { color: #b00020; background: #fde8ec; }
  ul#results li.fail::before { content: "FAIL  "; font-weight: bold; }
  #summary { margin-top: 1rem; font-weight: bold; }
</style>
</head>
<body>
<h1>SFSS browser tests</h1>
<ul id="results"></ul>
<div id="summary"></div>

<script type="module">
window.__results = [];

// ---------- tiny assertion helpers ----------
function assert(cond, msg) {
    if (!cond) throw new Error(msg || 'assertion failed');
}
function assertEqual(actual, expected, msg) {
    const a = JSON.stringify(actual);
    const e = JSON.stringify(expected);
    if (a !== e) throw new Error(`${msg || 'not equal'}: expected ${e}, got ${a}`);
}

// ---------- registry ----------
// Later phases: keep appending test(...) entries here.
const REGISTRY = [];
function test(name, fn) {
    REGISTRY.push({ name, fn });
}

// ---------- Phase 0 seed tests ----------

test('DOMParser parses styled-runs.fdx and finds styled Text runs', async () => {

    assert(res.ok, `fetch failed: ${res.status}`);

// ---------- Phase 3: pagination (PageRenderer) ----------

// Mirrors PageRenderer's CONTD_RE semantics: trailing "(CONT'D)" on a cue.
const CONTD_RE = /\(CONT'D\)\s*$/i;
let blockSeq = 0;

function makeBlock(type, text) {
    const div = document.createElement('div');
    div.className = `script-line ${type}`;
    div.dataset.lineId = `t${++blockSeq}`;
    div.textContent = text;
    return div;
}

// Deterministic filler prose (no randomness — the determinism test depends on it).
function loremWords(n, seed = 1) {
    const bank = ['the', 'quick', 'brown', 'fox', 'jumps', 'over', 'a', 'lazy', 'dog',
        'with', 'remarkable', 'speed', 'and', 'grace', 'while', 'night', 'falls',
        'slowly', 'across', 'this', 'valley', 'floor'];
    const out = [];
    for (let i = 0; i < n; i++) out.push(bank[(i * 7 + seed) % bank.length]);
    return out.join(' ');
}

// Renders `blocks` through a fresh PageRenderer into an on-DOM offscreen stage.
// Callers must stage.remove() in a finally block.
async function paginate(blocks) {
    await document.fonts.ready; // font swap mid-run would skew measurements
    const { PageRenderer } = await import('../../assets/js-mod/PageRenderer.js');
    const renderer = new PageRenderer();
    const stage = document.createElement('div');
    Object.assign(stage.style, { position: 'absolute', left: '-99999px', top: '0', width: '8.5in' });
    document.body.appendChild(stage);
    renderer.render(blocks, stage, {});
    const pages = Array.from(stage.querySelectorAll('.page'));
    return { renderer, stage, pages };
}

const wrappersOf = (pages) => pages.map(p => p.querySelector('.content-wrapper'));
const nonSynthetic = (wrapper) => Array.from(wrapper.children).filter(el => !el.hasAttribute('data-synthetic'));
const joinText = (els) => els.map(el => el.textContent.trim()).filter(Boolean).join(' ');

// Every element must end within the live area (contentHeightPx + 1px epsilon,
// + 0.5px for fractional client rects). Checked against the page origin so
// margins collapsing through the content wrapper are included.
function assertNoOverflow(renderer, pages) {
    const limit = renderer.contentHeightPx + 1.5;
    pages.forEach((page, pi) => {
        const liveTop = page.getBoundingClientRect().top + renderer.marginTopPx;
        for (const el of page.querySelector('.content-wrapper').children) {
            const bottom = el.getBoundingClientRect().bottom - liveTop;
            assert(bottom <= limit,
                `page ${pi + 1}: "${el.textContent.slice(0, 40)}" bottom ${bottom.toFixed(1)}px > ${limit}px`);
        }
    });
}

function assertNoPageEndsWithSlug(pages) {
    wrappersOf(pages).forEach((w, i) => {
        const last = w.lastElementChild;
        assert(last && !last.classList.contains('sc-slug'), `page ${i + 1} ends with a scene heading`);
    });
}

function dialogueFixture() {
    return [
        makeBlock('sc-slug', 'INT. WAREHOUSE - NIGHT'),
        makeBlock('sc-character', 'JOHN'),
        makeBlock('sc-dialogue', loremWords(600))
    ];
}

test('pagination: 600-word dialogue paginates lossless, nothing overflows', async () => {
    const blocks = dialogueFixture();
    const source = joinText(blocks);
    const { renderer, stage, pages } = await paginate(blocks);
    try {
        assert(pages.length >= 2, `expected >= 2 pages, got ${pages.length}`);
        const rendered = joinText(wrappersOf(pages).flatMap(nonSynthetic));
        assert(rendered === source,
            `non-synthetic text join differs from source (${rendered.length} vs ${source.length} chars)`);
        assertNoOverflow(renderer, pages);
        assertNoPageEndsWithSlug(pages);
    } finally { stage.remove(); }
});

test('pagination: ~3-page action paginates lossless, nothing overflows', async () => {
    const blocks = [
        makeBlock('sc-slug', 'EXT. DESERT - DAY'),
        makeBlock('sc-action', loremWords(1800, 5))
    ];
    const source = joinText(blocks);
    const { renderer, stage, pages } = await paginate(blocks);
    try {
        assert(pages.length >= 3, `expected >= 3 pages, got ${pages.length}`);
        const rendered = joinText(wrappersOf(pages).flatMap(nonSynthetic));
        assert(rendered === source,
            `non-synthetic text join differs from source (${rendered.length} vs ${source.length} chars)`);
        assertNoOverflow(renderer, pages);
        assertNoPageEndsWithSlug(pages);
    } finally { stage.remove(); }
});

test('pagination: dialogue splits end with (MORE), continuations open with (CONT\'D)', async () => {
    const { stage, pages } = await paginate(dialogueFixture());
    try {
        assert(pages.length >= 2, `expected >= 2 pages, got ${pages.length}`);
        const wrappers = wrappersOf(pages);
        wrappers.forEach((w, i) => {
            if (i < wrappers.length - 1) {
                const last = w.lastElementChild;
                assert(last.classList.contains('sc-more'), `page ${i + 1} does not end with .sc-more`);
                assert(last.dataset.synthetic === 'true', `(MORE) on page ${i + 1} not marked synthetic`);
                assert(last.textContent === '(MORE)', `unexpected (MORE) text: "${last.textContent}"`);
            }
            if (i > 0) {
                const first = w.firstElementChild;
                assert(first.dataset.synthetic === 'true', `continuation cue on page ${i + 1} not synthetic`);
                assert(CONTD_RE.test(first.textContent), `page ${i + 1} does not open with a (CONT'D) cue`);
                assert(first.textContent.startsWith('JOHN'), `continuation cue lost the character name`);
            }
        });
    } finally { stage.remove(); }
});

test('pagination: unsplittable dialogue bumps whole with zero (CONT\'D)', async () => {
    // 51 lines of slug+filler leave ~2 lines: too little for cue + 2 lines +
    // (MORE), so the block must move whole — and must NOT gain a (CONT'D).
    const blocks = [makeBlock('sc-slug', 'INT. ROOM - DAY')];
    for (let i = 0; i < 25; i++) blocks.push(makeBlock('sc-action', `Filler line ${i + 1}.`));
    blocks.push(makeBlock('sc-character', 'JOHN'));
    blocks.push(makeBlock('sc-dialogue', loremWords(40, 2)));
    const { stage, pages } = await paginate(blocks);
    try {
        assertEqual(pages.length, 2, 'page count');
        assertEqual(stage.querySelectorAll('.sc-more').length, 0, '(MORE) count');
        const contd = Array.from(stage.querySelectorAll('.content-wrapper > *'))
            .filter(el => CONTD_RE.test(el.textContent));
        assertEqual(contd.length, 0, "(CONT'D) count");
        const first = wrappersOf(pages)[1].firstElementChild;
        assertEqual(first.textContent, 'JOHN', 'bumped cue text');
        assert(!first.hasAttribute('data-synthetic'), 'bumped cue must not be synthetic');
    } finally { stage.remove(); }
});

test('pagination: page breaks before a slug that cannot carry 2 lines', async () => {
    // 25 one-line actions leave ~3 lines: slug + 2-line probe cannot fit,
    // so the break lands BEFORE the slug.
    const blocks = [];
    for (let i = 0; i < 25; i++) blocks.push(makeBlock('sc-action', `Filler line ${i + 1}.`));
    blocks.push(makeBlock('sc-slug', 'INT. BASEMENT - NIGHT'));
    blocks.push(makeBlock('sc-character', 'MARA'));
    blocks.push(makeBlock('sc-dialogue', loremWords(60, 3)));

    try {
        assertEqual(pages.length, 2, 'page count');
        assertNoPageEndsWithSlug(pages);
        const p2 = wrappersOf(pages)[1];

});

test('pagination: slug stranded by a bumped block is carried to the next page', async () => {
    // 24 filler lines leave room for slug + exactly 2 lines (probe passes), but
    // the dialogue then needs cue + 2 lines + (MORE) — it bumps whole, and the
    // slug must travel with it instead of dangling as the last line.
    const blocks = [];
    for (let i = 0; i < 24; i++) blocks.push(makeBlock('sc-action', `Filler line ${i + 1}.`));
    blocks.push(makeBlock('sc-slug', 'INT. BASEMENT - NIGHT'));
    blocks.push(makeBlock('sc-character', 'MARA'));
    blocks.push(makeBlock('sc-dialogue', loremWords(60, 4)));
    const { stage, pages } = await paginate(blocks);
    try {
        assertEqual(pages.length, 2, 'page count');
        assertNoPageEndsWithSlug(pages);
        const p2 = wrappersOf(pages)[1];
        assert(p2.firstElementChild.classList.contains('sc-slug'), 'page 2 must open with the carried slug');
        assertEqual(stage.querySelectorAll('.sc-more').length, 0, '(MORE) count');
        assert(!CONTD_RE.test(p2.children[1].textContent), 'carried block must not gain (CONT\'D)');
    } finally { stage.remove(); }
});

test('pagination: no split fragment is shorter than 2 lines (widow rule)', async () => {
    // Both fixtures split a single long source node, so every rendered
    // dialogue/action element is a split fragment and must be >= 2 lines.
    for (const [blocks, cls] of [
        [dialogueFixture(), '.sc-dialogue'],
        [[makeBlock('sc-slug', 'EXT. DESERT - DAY'), makeBlock('sc-action', loremWords(1800, 7))], '.sc-action']
    ]) {
        const { renderer, stage, pages } = await paginate(blocks);
        try {
            assert(pages.length >= 2, `expected a split, got ${pages.length} page(s)`);
            const minPx = 2 * renderer.lineHeightPx - 1;
            stage.querySelectorAll(`.content-wrapper > ${cls}`).forEach(el => {
                assert(el.offsetHeight >= minPx,
                    `${cls} fragment is ${el.offsetHeight}px (< 2 lines): "${el.textContent.slice(0, 40)}"`);
            });
        } finally { stage.remove(); }
    }
});

test('pagination: rendering is deterministic', async () => {
    const blocks = dialogueFixture();
    const a = await paginate(blocks);
    const htmlA = a.stage.innerHTML;
    a.stage.remove();
    const b = await paginate(blocks);
    const htmlB = b.stage.innerHTML;
    b.stage.remove();
    assert(htmlA === htmlB, 'two renders of the same source produced different DOM');
});

test('pagination: 10000-word action paginates under 1500ms', async () => {
    const blocks = [
        makeBlock('sc-slug', 'EXT. WASTELAND - DAY'),
        makeBlock('sc-action', loremWords(10000, 11))
    ];
    await document.fonts.ready;
    const t0 = performance.now();
    const { stage, pages } = await paginate(blocks);
    const ms = Math.round(performance.now() - t0);
    try {
        window.__paginationPerfMs = ms;
        assert(pages.length >= 10, `expected >= 10 pages, got ${pages.length}`);
        assert(ms < 1500, `pagination took ${ms}ms (budget 1500ms)`);
    } finally { stage.remove(); }
});

// ---------- Phase 4: canonical rendering + geometry unification ----------

// Canonical-block fixture: 17 scenes incl. one multi-page dialogue (scene 2),
// followed by a long run of short scenes so the final page is guaranteed to
// contain a scene start (FDX-style max startPage === pageCount).
function fixtureBlocks() {
    const blocks = [];
    let n = 0;
    const add = (type, text, extra = {}) => blocks.push({ id: `fx${++n}`, type, text, ...extra });
    add('sc-slug', 'INT. KITCHEN - DAY');
    add('sc-action', loremWords(60, 1));
    add('sc-character', 'ANA');
    add('sc-dialogue', loremWords(40, 2));
    add('sc-slug', 'EXT. STREET - NIGHT');
    add('sc-action', loremWords(120, 3));
    add('sc-character', 'JOHN');
    add('sc-dialogue', loremWords(700, 4)); // multi-page dialogue
    for (let s = 3; s <= 17; s++) {
        add('sc-slug', `INT. SCENE ${s} - DAY`);
        add('sc-action', `Short beat number ${s}.`);
    }
    return blocks;
}

test('HEADLINE: one engine — paginate() ≡ rendered .page count ≡ FDX max startPage; eighths sane', async () => {
    await document.fonts.ready;
    const { PageRenderer } = await import('../../assets/js-mod/PageRenderer.js');
    const renderer = new PageRenderer();
    const blocks = fixtureBlocks();

    // Engine result (what GeometryManager serves to toolbar/sidebar/reports/FDX)
    const geo = renderer.paginate(blocks, {});

    // Fake consumer path: page view / print render the same blocks via render()
    const stage = document.createElement('div');
    Object.assign(stage.style, { position: 'absolute', left: '-99999px', top: '0', width: '8.5in' });
    document.body.appendChild(stage);
    try {
        renderer.render(blocks, stage, {});
        const renderedPages = stage.querySelectorAll('.page').length;
        assert(geo.pageCount >= 4, `fixture too small: ${geo.pageCount} page(s)`);
        assertEqual(renderedPages, geo.pageCount, 'rendered .page count vs paginate() pageCount');
        assertEqual(geo.scenes.length, 17, 'scene count');

        // FDX consumer uses scene.startPage: the max must be the last page.
        const maxStart = Math.max(...geo.scenes.map(s => s.startPage));
        const maxEnd = Math.max(...geo.scenes.map(s => s.endPage));
        assertEqual(maxEnd, geo.pageCount, 'max endPage vs pageCount');
        assertEqual(maxStart, geo.pageCount, 'FDX-style max startPage vs pageCount');

        geo.scenes.forEach(s => assert(s.eighths >= 1, `scene ${s.id} has eighths ${s.eighths} < 1`));
        const diff = Math.abs(geo.totalEighths - geo.pageCount * 8);
        assert(diff <= geo.scenes.length,
            `totalEighths ${geo.totalEighths} vs pages*8 ${geo.pageCount * 8}: |diff| ${diff} > sceneCount ${geo.scenes.length}`);

        // Determinism across the two paths: identical scene start pages.
        const geo2 = renderer.paginate(blocks, {});
        assertEqual(geo2.scenes.map(s => s.startPage), geo.scenes.map(s => s.startPage), 'startPage determinism');
    } finally { stage.remove(); }
});

test('purity: pagination never touches a live editor container (R19)', async () => {
    const probe = document.createElement('div');
    probe.id = 'purity-probe-editor';
    probe.appendChild(makeBlock('sc-slug', 'INT. PROBE - DAY'));
    probe.appendChild(makeBlock('sc-action', 'Nothing must be appended here.'));
    document.body.appendChild(probe);
    const before = probe.innerHTML;

    const { PageRenderer } = await import('../../assets/js-mod/PageRenderer.js');
    const renderer = new PageRenderer();
    try {
        // Treatment-print equivalent: canonical blocks straight in, repeatedly
        // (the old code appended the whole script to the editor every render).
        const blocks = fixtureBlocks();
        for (let i = 0; i < 3; i++) {
            renderer.paginate(blocks, { showSceneNumbers: true, showPageNumbers: true, hideFirstPageMeta: true });
        }
        // Write-mode path: the probe's own live nodes as source.
        renderer.paginate(Array.from(probe.children), {});
        assertEqual(probe.childElementCount, 2, 'probe editor child count');
        assert(probe.innerHTML === before, 'probe editor DOM was mutated by pagination');
    } finally { probe.remove(); }
});

test('CSS parity: editor vs .page computed marginLeft/width/textTransform per type', async () => {
    await document.fonts.ready;
    assert(window.innerWidth >= 769, `viewport ${window.innerWidth}px too narrow for desktop editor rules`);

    // Editor context: content box exactly 6in wide, like #editor-container.
    const editorSim = document.createElement('div');
    Object.assign(editorSim.style, {
        position: 'absolute', left: '-99999px', top: '0', width: '6in',
        fontFamily: "'Courier Prime', monospace", fontSize: '12pt', lineHeight: '1.0'
    });
    // Page context: real .page grid.
    const pageWrap = document.createElement('div');
    Object.assign(pageWrap.style, { position: 'absolute', left: '-99999px', top: '0' });
    const page = document.createElement('div');
    page.className = 'page';
    const cw = document.createElement('div');
    cw.className = 'content-wrapper';
    page.appendChild(cw);
    pageWrap.appendChild(page);
    document.body.appendChild(editorSim);
    document.body.appendChild(pageWrap);

    try {
        const types = ['sc-slug', 'sc-action', 'sc-character', 'sc-dialogue', 'sc-parenthetical', 'sc-transition'];
        for (const t of types) {
            const a = makeBlock(t, 'Sample line');
            const b = makeBlock(t, 'Sample line');
            editorSim.appendChild(a);
            cw.appendChild(b);
            const ca = getComputedStyle(a);
            const cb = getComputedStyle(b);
            for (const prop of ['marginLeft', 'width', 'textTransform']) {
                assertEqual(cb[prop], ca[prop], `${t} ${prop} (editor "${ca[prop]}" vs page "${cb[prop]}")`);
            }
            a.remove(); b.remove();
        }
        // Centered override behaves identically in both contexts.
        const c1 = makeBlock('sc-dialogue', 'Centered');
        const c2 = makeBlock('sc-dialogue', 'Centered');
        c1.classList.add('sc-centered');
        c2.classList.add('sc-centered');
        editorSim.appendChild(c1);
        cw.appendChild(c2);
        for (const prop of ['marginLeft', 'width', 'textAlign']) {
            assertEqual(getComputedStyle(c2)[prop], getComputedStyle(c1)[prop], `sc-centered ${prop}`);
        }
        assertEqual(getComputedStyle(c1).textAlign, 'center', 'sc-centered text-align');
    } finally { editorSim.remove(); pageWrap.remove(); }
});

test('markup: page output renders <strong>, hides markers, drops [[notes]]', async () => {
    const { PageRenderer } = await import('../../assets/js-mod/PageRenderer.js');
    const renderer = new PageRenderer();
    const el = renderer.renderBlockElement({ id: 'm1', type: 'sc-action', text: '**bold** [[note]] plain' });
    assert(el.querySelector('strong'), 'no <strong> in page output');
    assertEqual(el.querySelector('strong').textContent, 'bold', 'strong content');
    assert(!el.textContent.includes('*'), 'emphasis markers leaked into output');
    assert(!el.textContent.includes('note'), '[[note]] content leaked into output');
    assert(el.textContent.includes('plain'), 'plain text missing from output');
    assertEqual(el.dataset.lineId, 'm1', 'lineId carried onto the element');

    // Flags: centered/tight become classes; pageBreak is a dataset marker.
    const flags = renderer.renderBlockElement({ id: 'm2', type: 'sc-action', text: 'x', centered: true, tight: true });
    assert(flags.classList.contains('sc-centered'), 'centered flag -> sc-centered class');
    assert(flags.classList.contains('sc-tight'), 'tight flag -> sc-tight class');

    // Parenthetical convention: DOM text carries no outer parens.
    const paren = renderer.renderBlockElement({ id: 'm3', type: 'sc-parenthetical', text: '(beat)' });
    assertEqual(paren.textContent, 'beat', 'outer parens stripped for DOM');

    // In full page output the note is dropped but bold survives pagination.
    const geoPages = renderer.paginate([
        { id: 'p1', type: 'sc-slug', text: 'INT. MARKUP - DAY' },
        { id: 'p2', type: 'sc-action', text: '**bold** [[note]] plain' }
    ], {}).pages;
    assertEqual(geoPages.length, 1, 'markup fixture page count');
    assert(geoPages[0].querySelector('.sc-action strong'), 'strong missing after pagination');
});

test('pageBreak: `===` block forces a new page and renders nothing', async () => {
    const { PageRenderer } = await import('../../assets/js-mod/PageRenderer.js');
    const renderer = new PageRenderer();
    const res = renderer.paginate([
        { id: 'b1', type: 'sc-slug', text: 'INT. ONE - DAY' },
        { id: 'b2', type: 'sc-action', text: 'First page.' },
        { id: 'b3', type: 'sc-action', text: '===', pageBreak: true },
        { id: 'b4', type: 'sc-slug', text: 'INT. TWO - DAY' },
        { id: 'b5', type: 'sc-action', text: 'Second page.' }
    ], {});
    assertEqual(res.pageCount, 2, 'page count with forced break');
    const p2First = res.pages[1].querySelector('.content-wrapper').firstElementChild;
    assert(p2First.classList.contains('sc-slug'), 'page 2 must open with the slug after ===');
    assertEqual(res.scenes.length, 2, 'scene count');
    assertEqual(res.scenes[1].startPage, 2, 'second scene start page');
    // The `===` block itself must not appear anywhere in the output.
    res.pages.forEach(p => {
        assert(!p.textContent.includes('==='), '=== rendered visibly');
    });
});

test('markup editor: toggleEmphasis wrap/unwrap round-trips text + selection offsets', async () => {

test('forces: ".int rooftop" -> SLUG (dot stripped), "@McClane" -> CHARACTER keeping case', async () => {
    const { EditorHandler } = await import('../../assets/js-mod/EditorHandler.js');
    // checkForces exercised directly on a synthetic block via a stubbed
    // handler (the real constructor wires the whole editor).
    const makeStub = () => {
        const stub = Object.create(EditorHandler.prototype);
        stub.saved = 0;
        stub.app = { saveState: () => { stub.saved++; } };
        stub.popupState = { active: false };
        stub.updateContext = () => {};
        stub.predictCharacter = () => {};
        stub.showTypeHint = () => {};
        stub.setCaret = () => {};
        return stub;
    };

    const slugStub = makeStub();
    const b1 = makeBlock('sc-action', '.int rooftop');
    assert(slugStub.checkForces(b1, b1.textContent) === true, 'dot force did not fire');
    assert(b1.classList.contains('sc-slug'), '".int rooftop" must become a SLUG');
    assertEqual(b1.textContent, 'int rooftop', 'leading dot must be stripped');
    assert(slugStub.saved >= 1, 'history must be snapshotted before the conversion');

    // Ellipsis guard: '..'/'. ' prefixes never force.
    const b2 = makeBlock('sc-action', '...and then');
    assert(makeStub().checkForces(b2, b2.textContent) === false, 'ellipsis must not force a slug');
    assert(b2.classList.contains('sc-action'), 'ellipsis block type must not change');

    const charStub = makeStub();
    const b3 = makeBlock('sc-action', '@McClane');
    assert(charStub.checkForces(b3, b3.textContent) === true, '@ force did not fire');
    assert(b3.classList.contains('sc-character'), '"@McClane" must become a CHARACTER');
    assertEqual(b3.textContent, 'McClane', '@ stripped, typed case kept');
    assertEqual(b3.dataset.forced, 'true', 'data-forced must suppress auto-uppercase until blur');
});

// Fresh GeometryManager over a fake app; used by the paper tests. Callers

test('A4 parity: pageCount and per-scene eighths identical on Letter and A4', async () => {
    await document.fonts.ready;
    const gm = await makeGeometry(fixtureBlocks());
    try {
        const letter = gm.getScenePagination({ fresh: true });
        assert(letter.pageCount >= 4, `fixture too small: ${letter.pageCount} page(s)`);
        gm.setPaperSize('A4_EMULATION');
        assertEqual(gm.renderer.paperConfig.cssSize, 'A4', 'renderer paper switched');
        const a4 = gm.getScenePagination({ fresh: true });
        assertEqual(a4.pageCount, letter.pageCount, 'A4 vs Letter page count');
        assertEqual(a4.scenes.map(s => s.eighths), letter.scenes.map(s => s.eighths), 'per-scene eighths');
        assertEqual(a4.totalEighths, letter.totalEighths, 'total eighths');
    } finally { gm.setPaperSize('US_LETTER'); }
});

test('A4 CSS vars: .page box follows setPaperSize (8.27in ~ 793.92px, back to 816px)', async () => {
    const gm = await makeGeometry([]);
    const wrap = document.createElement('div');
    Object.assign(wrap.style, { position: 'absolute', left: '-99999px', top: '0' });
    const page = document.createElement('div');
    page.className = 'page';
    wrap.appendChild(page);
    document.body.appendChild(wrap);
    try {
        gm.setPaperSize('A4_EMULATION');
        const rootVars = getComputedStyle(document.documentElement);
        assertEqual(rootVars.getPropertyValue('--page-width').trim(), '8.27in', ':root --page-width');
        assertEqual(rootVars.getPropertyValue('--page-pad-bottom').trim(), '1.69in', ':root --page-pad-bottom');
        const a4 = getComputedStyle(page);
        const a4W = parseFloat(a4.width);
        assert(Math.abs(a4W - 793.92) <= 1, `.page width on A4 is ${a4W}px (expected ~793.92px)`);
        // Live width stays 6.0in: 8.27 - 1.5 - 0.77 (parity margins).
        const liveW = a4W - parseFloat(a4.paddingLeft) - parseFloat(a4.paddingRight);
        assert(Math.abs(liveW - 576) <= 1, `A4 live width is ${liveW}px (expected 576px = 6in)`);

        gm.setPaperSize('US_LETTER');
        const letterW = parseFloat(getComputedStyle(page).width);
        assert(Math.abs(letterW - 816) <= 1, `.page width on Letter is ${letterW}px (expected 816px)`);
    } finally { wrap.remove(); gm.setPaperSize('US_LETTER'); }
});

test('A4 meta round-trip: paperSize survives export -> import; legacy import resets to Letter', async () => {
    const { SFSS } = await import('../../assets/js-mod/SFSS.js');
    const { GeometryManager } = await import('../../assets/js-mod/GeometryManager.js');

    // Real SFSS.prototype import/export over a stubbed environment: only the
    // collaborators importJSON/exportToJSONStructure touch are provided, and
    // applySettings is narrowed to its Phase 8 geometry-restore line.
    const makeApp = () => {
        const app = Object.create(SFSS.prototype);
        app.meta = {
            title: '', author: '', contact: '',
            showTitlePage: false, showSceneNumbers: false, showDate: false,
            paperSize: 'US_LETTER'
        };
        app.sceneMeta = {};
        app.boneyard = [];
        app.characters = new Set();
        app.editor = document.createElement('div');
        app.treatmentManager = { isActive: false };
        app.sidebarManager = { updateSceneList: () => {}, updateSidebarHeader: () => {} };
        app.mediaPlayer = { updatePlaylist: () => {} };
        app.editorHandler = {
            createBlock: (type, text) => {
                const el = document.createElement('div');
                el.className = `script-line ${type}`;
                el.textContent = text || '';
                return el;
            },
            getBlockType: (el) => Array.from(el.classList).find(c => c.startsWith('sc-')),
            setBlockType: (el, type) => { el.className = `script-line ${type}`; },
            maybeDecorate: () => {}
        };
        app.geometry = new GeometryManager(app);
        app.applySettings = function () {
            if (this.geometry) this.geometry.setPaperSize(this.meta.paperSize || 'US_LETTER');
        };
        return app;
    };

    const a = makeApp();
    const b = makeApp();
    try {
        await a.importJSON({
            meta: { title: 'Round Trip' },
            blocks: [
                { id: 'rt1', type: 'sc-slug', text: 'INT. ROUNDTRIP - DAY' },
                { id: 'rt2', type: 'sc-action', text: 'Beat.' }
            ]
        }, true);
        assertEqual(a.meta.paperSize, 'US_LETTER', 'meta without paperSize defaults to US Letter');

        a.meta.paperSize = 'A4_EMULATION';
        const exported = JSON.parse(JSON.stringify(a.exportToJSONStructure()));
        assertEqual(exported.meta.paperSize, 'A4_EMULATION', 'export carries paperSize');

        await b.importJSON(exported, true);
        assertEqual(b.meta.paperSize, 'A4_EMULATION', 'import restores paperSize');
        assertEqual(b.geometry.renderer.paperConfig.cssSize, 'A4', 'geometry follows imported paperSize');
        assertEqual(b.editor.querySelectorAll('.script-line').length, 2, 'blocks imported');

        // Legacy scripts (no paperSize in meta) reset to US Letter even when
        // the previously open script was A4.
        delete exported.meta.paperSize;
        await b.importJSON(exported, true);
        assertEqual(b.meta.paperSize, 'US_LETTER', 'legacy import defaults to US Letter');
        assertEqual(b.geometry.renderer.paperConfig.cssSize, 'letter', 'geometry reset to Letter');
    } finally {
        (await makeGeometry([])).setPaperSize('US_LETTER');
    }
});

// ---------- runner ----------
async function run() {
    const ul = document.getElementById('results');
    for (const { name, fn } of REGISTRY) {
        const entry = { name, ok: false, error: null };
        try {
            await fn();
            entry.ok = true;
        } catch (e) {
            entry.error = e && e.message ? e.message : String(e);
        }
        window.__results.push(entry);
        const li = document.createElement('li');
        li.className = entry.ok ? 'pass' : 'fail';
        li.textContent = entry.ok ? name : `${name} — ${entry.error}`;
        ul.appendChild(li);
    }
    const passed = window.__results.filter(r => r.ok).length;
    const failed = window.__results.length - passed;
    let summary = `${passed} passed, ${failed} failed`;
    if (window.__paginationPerfMs != null) summary += ` | 10k-word pagination: ${window.__paginationPerfMs}ms`;
    document.getElementById('summary').textContent = summary;
    document.title = failed ? 'FAIL' : 'PASS';
    document.body.dataset.done = '1';
}
run();
